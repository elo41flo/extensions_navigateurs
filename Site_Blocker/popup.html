<body>

                <li>facebook.com</li>
                <li>youtube.com</li>
                <li>instagram.com</li>
            </ul>
        </div>

        <p class="footer-note">Reste concentré, Elo ! 💻</p>
    </div>
    <script src="popup.js"></script>
</body>
</html>
